<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="1600" height="900" fill="#f0f7f8"/>

  <!-- ── Input Image Card ───────────────────────── -->
  <rect x="60" y="200" width="320" height="500" rx="12" fill="#ffffff" stroke="#b3dde3" stroke-width="2"/>
  <text x="220" y="175" text-anchor="middle" font-size="22" fill="#5a7a8a" font-weight="600" letter-spacing="1">INPUT IMAGE</text>

  <!-- Simulated underwater photo -->
  <rect x="80" y="220" width="280" height="200" rx="8" fill="#0d3d50"/>
  <!-- Water caustic shimmer lines -->
  <line x1="80" y1="240" x2="360" y2="240" stroke="#1a5570" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="260" x2="360" y2="260" stroke="#1a5570" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="290" x2="360" y2="290" stroke="#1a5570" stroke-width="1" opacity="0.3"/>
  <!-- Coral shapes -->
  <!-- Branching coral 1 -->
  <line x1="130" y1="420" x2="130" y2="350" stroke="#e8886a" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="380" x2="100" y2="340" stroke="#e8886a" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="365" x2="155" y2="335" stroke="#e8886a" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="355" x2="112" y2="322" stroke="#e8886a" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="355" x2="148" y2="320" stroke="#e8886a" stroke-width="3" stroke-linecap="round"/>
  <!-- Coral dots tips -->
  <circle cx="100" cy="338" r="5" fill="#f4a882"/>
  <circle cx="155" cy="333" r="5" fill="#f4a882"/>
  <circle cx="112" cy="320" r="4" fill="#f4a882"/>
  <circle cx="148" cy="318" r="4" fill="#f4a882"/>
  <circle cx="130" cy="348" r="4" fill="#f4a882"/>

  <!-- Branching coral 2 -->
  <line x1="230" y1="420" x2="230" y2="345" stroke="#4ab8c2" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="375" x2="200" y2="335" stroke="#4ab8c2" stroke-width="4" stroke-linecap="round"/>
  <line x1="230" y1="360" x2="258" y2="328" stroke="#4ab8c2" stroke-width="4" stroke-linecap="round"/>
  <line x1="230" y1="350" x2="215" y2="318" stroke="#4ab8c2" stroke-width="3" stroke-linecap="round"/>
  <line x1="230" y1="350" x2="244" y2="316" stroke="#4ab8c2" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="333" r="5" fill="#7dd4dc"/>
  <circle cx="258" cy="326" r="5" fill="#7dd4dc"/>
  <circle cx="215" cy="316" r="4" fill="#7dd4dc"/>
  <circle cx="244" cy="314" r="4" fill="#7dd4dc"/>
  <circle cx="230" cy="343" r="4" fill="#7dd4dc"/>

  <!-- Boulder coral -->
  <ellipse cx="310" cy="415" rx="35" ry="25" fill="#8ab87e"/>
  <ellipse cx="310" cy="415" rx="25" ry="17" fill="none" stroke="#6a9860" stroke-width="1.5" opacity="0.6"/>
  <circle cx="302" cy="408" r="3" fill="#6a9860" opacity="0.5"/>
  <circle cx="316" cy="412" r="2.5" fill="#6a9860" opacity="0.5"/>
  <circle cx="308" cy="420" r="2" fill="#6a9860" opacity="0.5"/>

  <!-- Seabed -->
  <rect x="80" y="410" width="280" height="10" rx="2" fill="#1a4a60" opacity="0.6"/>

  <!-- Image label -->
  <text x="220" y="460" text-anchor="middle" font-size="13" fill="#5a7a8a" font-weight="500">Underwater coral photograph</text>

  <!-- Scale bar decoration -->
  <rect x="90" y="475" width="60" height="3" rx="1" fill="#0099aa" opacity="0.4"/>
  <text x="160" y="479" font-size="11" fill="#7a9aaa">10 cm</text>

  <!-- Metadata rows -->
  <rect x="80" y="495" width="280" height="30" rx="4" fill="#f0f7f8"/>
  <text x="95" y="514" font-size="12" fill="#5a7a8a">📍 Port City Colombo, LK</text>
  <rect x="80" y="533" width="280" height="30" rx="4" fill="#f0f7f8"/>
  <text x="95" y="552" font-size="12" fill="#5a7a8a">🕐 T₀ baseline frame</text>
  <rect x="80" y="571" width="280" height="30" rx="4" fill="#f0f7f8"/>
  <text x="95" y="590" font-size="12" fill="#5a7a8a">📐 1920 × 1080 px · RGB</text>
  <rect x="80" y="609" width="280" height="30" rx="4" fill="#f0f7f8"/>
  <text x="95" y="628" font-size="12" fill="#5a7a8a">🌊 Depth: 4–8 m</text>

  <!-- ── Arrow 1 ───────────────────────────────── -->
  <line x1="390" y1="450" x2="470" y2="450" stroke="#0099aa" stroke-width="3"/>
  <polygon points="470,443 485,450 470,457" fill="#0099aa"/>
  <text x="437" y="440" text-anchor="middle" font-size="13" fill="#0099aa">feed</text>

  <!-- ── EfficientNet Model Block ───────────────── -->
  <rect x="490" y="330" width="310" height="240" rx="12" fill="#0d1f2d" stroke="#0099aa" stroke-width="2"/>
  <text x="645" y="365" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700">EfficientNet-B0</text>
  <text x="645" y="387" text-anchor="middle" font-size="12" fill="#7ab8c2">Pre-trained ImageNet · Fine-tuned</text>

  <!-- Conv layers visual -->
  <rect x="510" y="400" width="38" height="100" rx="4" fill="#0099aa" opacity="0.85"/>
  <text x="529" y="458" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">Conv</text>
  <text x="529" y="472" text-anchor="middle" font-size="9" fill="#cce8ec">L1</text>

  <rect x="556" y="415" width="38" height="85" rx="4" fill="#0099aa" opacity="0.72"/>
  <text x="575" y="465" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">Conv</text>
  <text x="575" y="478" text-anchor="middle" font-size="9" fill="#cce8ec">L2</text>

  <rect x="602" y="428" width="38" height="72" rx="4" fill="#0099aa" opacity="0.60"/>
  <text x="621" y="472" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">MBConv</text>
  <text x="621" y="484" text-anchor="middle" font-size="9" fill="#cce8ec">×6</text>

  <rect x="648" y="438" width="38" height="62" rx="4" fill="#0099aa" opacity="0.50"/>
  <text x="667" y="475" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">Pool</text>

  <rect x="694" y="445" width="38" height="55" rx="4" fill="#e05a3a" opacity="0.85"/>
  <text x="713" y="476" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">FC</text>
  <text x="713" y="489" text-anchor="middle" font-size="9" fill="#ffd0c0">Softmax</text>

  <!-- Accuracy badge -->
  <rect x="510" y="520" width="270" height="32" rx="6" fill="rgba(0,153,170,0.15)" stroke="rgba(0,153,170,0.3)" stroke-width="1"/>
  <text x="645" y="541" text-anchor="middle" font-size="12" fill="#0099aa" font-weight="600">Validation Accuracy · Fine-tuned weights</text>

  <!-- ── Segmentation Block (below model) ──────── -->
  <rect x="490" y="590" width="310" height="100" rx="12" fill="#0d2a35" stroke="#0099aa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="645" y="618" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="700">Colony Segmentation</text>
  <text x="645" y="638" text-anchor="middle" font-size="11" fill="#7ab8c2">Mask generation · Area computation</text>
  <!-- Mask thumbnail -->
  <rect x="510" y="648" width="50" height="30" rx="3" fill="#1a4050"/>
  <ellipse cx="535" cy="663" rx="15" ry="10" fill="#0099aa" opacity="0.7"/>
  <text x="575" y="660" font-size="11" fill="#aaccdd">Colony boundary → pixel area</text>
  <text x="575" y="675" font-size="11" fill="#aaccdd">ΔArea(T₀→Tₙ) = growth proxy</text>

  <!-- ── Arrow 2 ───────────────────────────────── -->
  <line x1="810" y1="390" x2="880" y2="390" stroke="#0099aa" stroke-width="3"/>
  <polygon points="880,383 895,390 880,397" fill="#0099aa"/>
  <text x="852" y="380" text-anchor="middle" font-size="13" fill="#0099aa">classify</text>

  <line x1="810" y1="635" x2="880" y2="635" stroke="#0099aa" stroke-width="3" stroke-dasharray="6,3"/>
  <polygon points="880,628 895,635 880,642" fill="#0099aa"/>
  <text x="852" y="622" text-anchor="middle" font-size="13" fill="#0099aa">segment</text>

  <!-- ── Output Panel ───────────────────────────── -->
  <!-- Species Classification Card -->
  <rect x="900" y="290" width="340" height="230" rx="12" fill="#ffffff" stroke="#b3dde3" stroke-width="2"/>
  <rect x="900" y="290" width="340" height="44" rx="12" fill="#0d1f2d"/>
  <rect x="900" y="322" width="340" height="12" fill="#0d1f2d"/>
  <text x="1070" y="318" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700" letter-spacing="1">SPECIES CLASSIFICATION</text>

  <!-- Top result -->
  <rect x="918" y="348" width="304" height="52" rx="6" fill="#f0fafb" stroke="#b3dde3" stroke-width="1"/>
  <rect x="918" y="348" width="5" height="52" rx="2" fill="#0099aa"/>
  <text x="934" y="370" font-size="13" fill="#0d1f2d" font-weight="700">Acropora muricata</text>
  <text x="934" y="388" font-size="11" fill="#5a7a8a">Branching coral · Indo-Pacific</text>
  <rect x="1148" y="356" width="66" height="24" rx="12" fill="#0099aa"/>
  <text x="1181" y="372" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="700">94.2%</text>

  <!-- 2nd result -->
  <rect x="918" y="408" width="304" height="40" rx="6" fill="#f8f8f8"/>
  <rect x="918" y="408" width="5" height="40" rx="2" fill="#7ab8c2"/>
  <text x="934" y="425" font-size="12" fill="#3d5566">Acropora digitifera</text>
  <text x="934" y="440" font-size="10" fill="#5a7a8a">Branching coral</text>
  <rect x="1168" y="415" width="46" height="20" rx="10" fill="rgba(0,153,170,0.15)"/>
  <text x="1191" y="429" text-anchor="middle" font-size="11" fill="#0099aa" font-weight="600">4.8%</text>

  <!-- 3rd result -->
  <rect x="918" y="456" width="304" height="40" rx="6" fill="#f8f8f8"/>
  <rect x="918" y="456" width="5" height="40" rx="2" fill="#b3d8dd"/>
  <text x="934" y="473" font-size="12" fill="#3d5566">Porites lobata</text>
  <text x="934" y="488" font-size="10" fill="#5a7a8a">Massive coral</text>
  <rect x="1168" y="463" width="46" height="20" rx="10" fill="rgba(0,153,170,0.08)"/>
  <text x="1191" y="477" text-anchor="middle" font-size="11" fill="#7ab8c2" font-weight="600">1.0%</text>

  <!-- Growth Monitoring Card -->
  <rect x="900" y="540" width="340" height="220" rx="12" fill="#ffffff" stroke="#b3dde3" stroke-width="2"/>
  <rect x="900" y="540" width="340" height="44" rx="12" fill="#0d1f2d"/>
  <rect x="900" y="572" width="340" height="12" fill="#0d1f2d"/>
  <text x="1070" y="568" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700" letter-spacing="1">GROWTH MONITORING</text>

  <!-- Timeline bars -->
  <text x="920" y="606" font-size="11" fill="#5a7a8a">Colony area (cm²) over time</text>

  <text x="920" y="630" font-size="11" fill="#3d5566">T₀</text>
  <rect x="940" y="618" width="110" height="16" rx="3" fill="#0099aa" opacity="0.35"/>
  <text x="1056" y="630" font-size="11" fill="#5a7a8a">18.4 cm²</text>

  <text x="920" y="658" font-size="11" fill="#3d5566">T₁</text>
  <rect x="940" y="646" width="150" height="16" rx="3" fill="#0099aa" opacity="0.55"/>
  <text x="1096" y="658" font-size="11" fill="#5a7a8a">24.1 cm²</text>

  <text x="920" y="686" font-size="11" fill="#3d5566">T₂</text>
  <rect x="940" y="674" width="195" height="16" rx="3" fill="#0099aa" opacity="0.80"/>
  <text x="1141" y="686" font-size="11" fill="#5a7a8a">31.0 cm²</text>

  <text x="920" y="714" font-size="11" fill="#3d5566">T₃</text>
  <rect x="940" y="702" width="240" height="16" rx="3" fill="#0099aa"/>
  <text x="1186" y="714" font-size="11" fill="#5a7a8a">38.4 cm²</text>

  <!-- Growth rate badge -->
  <rect x="920" y="730" width="300" height="22" rx="6" fill="rgba(0,153,170,0.1)" stroke="rgba(0,153,170,0.25)" stroke-width="1"/>
  <text x="1070" y="745" text-anchor="middle" font-size="12" fill="#0099aa" font-weight="700">↑ +108.7% growth · 3 survey intervals</text>

  <!-- ── Step Labels ─────────────────────────────── -->
  <rect x="60" y="130" width="100" height="26" rx="13" fill="rgba(0,153,170,0.12)" stroke="rgba(0,153,170,0.3)" stroke-width="1"/>
  <text x="110" y="148" text-anchor="middle" font-size="12" fill="#0099aa" font-weight="600">① Capture</text>

  <rect x="545" y="130" width="200" height="26" rx="13" fill="rgba(0,153,170,0.12)" stroke="rgba(0,153,170,0.3)" stroke-width="1"/>
  <text x="645" y="148" text-anchor="middle" font-size="12" fill="#0099aa" font-weight="600">② Model Inference</text>

  <rect x="970" y="130" width="200" height="26" rx="13" fill="rgba(0,153,170,0.12)" stroke="rgba(0,153,170,0.3)" stroke-width="1"/>
  <text x="1070" y="148" text-anchor="middle" font-size="12" fill="#0099aa" font-weight="600">③ Decision Output</text>

  <!-- Connecting line between classification and growth card -->
  <line x1="1070" y1="520" x2="1070" y2="540" stroke="#0099aa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="800" y="60" text-anchor="middle" font-size="28" fill="#0d1f2d" font-weight="700">Coral Species Identification &amp; Growth Monitoring</text>
  <text x="800" y="90" text-anchor="middle" font-size="16" fill="#5a7a8a">EfficientNet-B0 Classification Pipeline · Colony Segmentation · Temporal Growth Quantification</text>
  <line x1="200" y1="108" x2="1400" y2="108" stroke="rgba(0,153,170,0.2)" stroke-width="1"/>

</svg>
